services:
  ea-api:
    build:
      context: .
      dockerfile: ea/Dockerfile
    image: ea-rewrite:latest
    container_name: ea-api
    restart: unless-stopped
    mem_limit: 4g
    mem_reservation: 1g
    env_file:
      - .env
    environment:
      - EA_ROLE=api
      - EA_PORT=8090
      - EA_ARTIFACTS_DIR=/data/artifacts
      - EA_RESPONSES_PROVIDER_LEDGER_DIR=/data/provider-ledger
      - HOME=/home/ea
      - EA_RUN_AS_UID=${EA_GEMINI_UID:-1000}
      - EA_RUN_AS_GID=${EA_GEMINI_GID:-1000}
      - EA_GEMINI_VORTEX_COMMAND=node /usr/lib/node_modules/@google/gemini-cli/dist/index.js
      - EA_CREZLO_PROPERTY_TOUR_WORKER=/docker/EA/scripts/crezlo_property_tour_worker.py
      - EA_CREZLO_SHARED_TEMP_ROOT=/docker/fleet/state/browseract_bootstrap/runtime/crezlo_worker_shared
      - EA_MOOTION_MOVIE_WORKER=/docker/EA/scripts/mootion_movie_worker.py
      - EA_AVOMAP_FLYOVER_WORKER=/docker/EA/scripts/avomap_flyover_worker.py
      - EA_BOOKA_BOOK_WORKER=/docker/EA/scripts/booka_book_worker.py
      - EA_PUBLIC_RESULT_PUBLISHER=/docker/EA/scripts/publish_browseract_ui_results.py
      - TZ=Europe/Vienna
    ports:
      - "${EA_HOST_PORT:-8090}:8090"
    volumes:
      - ./config:/config:ro
      - ./config:/app/config:ro
      - ea_artifacts:/data/artifacts
      - ea_provider_ledger:/data/provider-ledger
      - /docker:/docker
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/node:/usr/bin/node:ro
      - /usr/lib/node_modules:/usr/lib/node_modules:ro
      - ${HOME}/.gemini:/home/ea/.gemini:rw
      - /etc/passwd:/etc/passwd:ro
      - /etc/group:/etc/group:ro
    depends_on:
      ea-db:
        condition: service_healthy

  ea-responses-proxy:
    image: ea-rewrite:latest
    container_name: ea-responses-proxy
    restart: unless-stopped
    mem_limit: 2g
    mem_reservation: 512m
    env_file:
      - .env
    environment:
      - EA_ROLE=api
      - EA_RESPONSES_PROXY_PORT=8091
      - HOME=/home/ea
      - EA_RUN_AS_UID=${EA_GEMINI_UID:-1000}
      - EA_RUN_AS_GID=${EA_GEMINI_GID:-1000}
      - EA_GEMINI_VORTEX_COMMAND=node /usr/lib/node_modules/@google/gemini-cli/dist/index.js
      - TZ=Europe/Vienna
    ports:
      - "${EA_RESPONSES_PROXY_HOST_PORT:-8092}:8091"
    volumes:
      - ./config:/config:ro
      - ./config:/app/config:ro
      - ea_artifacts:/data/artifacts
      - ea_provider_ledger:/data/provider-ledger
      - /docker:/docker
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/node:/usr/bin/node:ro
      - /usr/lib/node_modules:/usr/lib/node_modules:ro
      - ${HOME}/.gemini:/home/ea/.gemini:rw
      - /etc/passwd:/etc/passwd:ro
      - /etc/group:/etc/group:ro
    command:
      - env
      - PYTHONPATH=/docker/EA/ea
      - python
      - /docker/EA/scripts/ea_responses_proxy.py
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS --connect-timeout 2 --max-time 10 http://127.0.0.1:8091/health/ready >/dev/null
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      ea-db:
        condition: service_healthy

  ea-worker:
    build:
      context: .
      dockerfile: ea/Dockerfile
    image: ea-rewrite:latest
    container_name: ea-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - EA_ROLE=worker
      - EA_ARTIFACTS_DIR=/data/artifacts
      - EA_RESPONSES_PROVIDER_LEDGER_DIR=/data/provider-ledger
      - HOME=/home/ea
      - EA_RUN_AS_UID=${EA_GEMINI_UID:-1000}
      - EA_RUN_AS_GID=${EA_GEMINI_GID:-1000}
      - EA_GEMINI_VORTEX_COMMAND=node /usr/lib/node_modules/@google/gemini-cli/dist/index.js
      - EA_CREZLO_PROPERTY_TOUR_WORKER=/docker/EA/scripts/crezlo_property_tour_worker.py
      - EA_CREZLO_SHARED_TEMP_ROOT=/docker/fleet/state/browseract_bootstrap/runtime/crezlo_worker_shared
      - EA_MOOTION_MOVIE_WORKER=/docker/EA/scripts/mootion_movie_worker.py
      - EA_AVOMAP_FLYOVER_WORKER=/docker/EA/scripts/avomap_flyover_worker.py
      - EA_BOOKA_BOOK_WORKER=/docker/EA/scripts/booka_book_worker.py
      - EA_PUBLIC_RESULT_PUBLISHER=/docker/EA/scripts/publish_browseract_ui_results.py
      - TZ=Europe/Vienna
    volumes:
      - ./config:/config:ro
      - ./config:/app/config:ro
      - ea_artifacts:/data/artifacts
      - ea_provider_ledger:/data/provider-ledger
      - /docker:/docker
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/node:/usr/bin/node:ro
      - /usr/lib/node_modules:/usr/lib/node_modules:ro
      - ${HOME}/.gemini:/home/ea/.gemini:rw
      - /etc/passwd:/etc/passwd:ro
      - /etc/group:/etc/group:ro
    depends_on:
      ea-db:
        condition: service_healthy

  ea-scheduler:
    build:
      context: .
      dockerfile: ea/Dockerfile
    image: ea-rewrite:latest
    container_name: ea-scheduler
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - EA_ROLE=scheduler
      - EA_ARTIFACTS_DIR=/data/artifacts
      - EA_RESPONSES_PROVIDER_LEDGER_DIR=/data/provider-ledger
      - HOME=/home/ea
      - EA_RUN_AS_UID=${EA_GEMINI_UID:-1000}
      - EA_RUN_AS_GID=${EA_GEMINI_GID:-1000}
      - EA_GEMINI_VORTEX_COMMAND=node /usr/lib/node_modules/@google/gemini-cli/dist/index.js
      - EA_CREZLO_PROPERTY_TOUR_WORKER=/docker/EA/scripts/crezlo_property_tour_worker.py
      - EA_CREZLO_SHARED_TEMP_ROOT=/docker/fleet/state/browseract_bootstrap/runtime/crezlo_worker_shared
      - EA_MOOTION_MOVIE_WORKER=/docker/EA/scripts/mootion_movie_worker.py
      - EA_AVOMAP_FLYOVER_WORKER=/docker/EA/scripts/avomap_flyover_worker.py
      - EA_BOOKA_BOOK_WORKER=/docker/EA/scripts/booka_book_worker.py
      - EA_PUBLIC_RESULT_PUBLISHER=/docker/EA/scripts/publish_browseract_ui_results.py
      - TZ=Europe/Vienna
    volumes:
      - ./config:/config:ro
      - ./config:/app/config:ro
      - ea_artifacts:/data/artifacts
      - ea_provider_ledger:/data/provider-ledger
      - /docker:/docker
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/node:/usr/bin/node:ro
      - /usr/lib/node_modules:/usr/lib/node_modules:ro
      - ${HOME}/.gemini:/home/ea/.gemini:rw
      - /etc/passwd:/etc/passwd:ro
      - /etc/group:/etc/group:ro
    depends_on:
      ea-db:
        condition: service_healthy

  ea-cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ea-cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${EA_CF_TUNNEL_TOKEN}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - ea-api

  ea-db:
    image: postgres:16-alpine
    container_name: ea-db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ea_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ea_artifacts: {}
  ea_pgdata: {}
  ea_provider_ledger: {}
