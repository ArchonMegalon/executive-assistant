services:
  ea-api:
    build:
      context: .
      dockerfile: ea/Dockerfile
    image: ea-rewrite:latest
    container_name: ea-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - EA_ROLE=api
      - EA_PORT=8090
      - EA_RESPONSES_PROVIDER_LEDGER_DIR=/data/provider-ledger
      - TZ=Europe/Vienna
    ports:
      - "${EA_HOST_PORT:-8090}:8090"
    volumes:
      - ./config:/config:ro
      - ea_provider_ledger:/data/provider-ledger
    depends_on:
      ea-db:
        condition: service_healthy

  ea-worker:
    build:
      context: .
      dockerfile: ea/Dockerfile
    image: ea-rewrite:latest
    container_name: ea-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - EA_ROLE=worker
      - EA_RESPONSES_PROVIDER_LEDGER_DIR=/data/provider-ledger
      - TZ=Europe/Vienna
    volumes:
      - ./config:/config:ro
      - ea_provider_ledger:/data/provider-ledger
    depends_on:
      ea-db:
        condition: service_healthy

  ea-scheduler:
    build:
      context: .
      dockerfile: ea/Dockerfile
    image: ea-rewrite:latest
    container_name: ea-scheduler
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - EA_ROLE=scheduler
      - EA_RESPONSES_PROVIDER_LEDGER_DIR=/data/provider-ledger
      - TZ=Europe/Vienna
    volumes:
      - ./config:/config:ro
      - ea_provider_ledger:/data/provider-ledger
    depends_on:
      ea-db:
        condition: service_healthy

  ea-cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ea-cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${EA_CF_TUNNEL_TOKEN}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - ea-api

  ea-db:
    image: postgres:16-alpine
    container_name: ea-db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ea_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ea_pgdata: {}
  ea_provider_ledger: {}
