- Continue the orchestrator split by extracting step dependency or execution, approval pause or resume, and human-task routing seams behind a thinner orchestration facade.
- Split `tool_execution.py` into adapter-focused modules for artifact handling, BrowserAct extraction, and connector dispatch, and remove hidden in-memory dependency fallback from the service constructor.
- Add memory reasoning services for context packs, promotion, conflicts, and commitment risk so the runtime can synthesize task-ready context from the existing memory substrate.
- Make worker topology explicit in compose with `ea-api`, `ea-worker`, and `ea-scheduler`, improve worker logging and idle backoff, split the giant smoke runtime API file, and trim the root README into a runtime-first guide.
