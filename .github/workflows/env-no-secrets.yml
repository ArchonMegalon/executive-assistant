name: Env Secret Guard

on:
  pull_request:
    paths:
      - ".env*"
      - "**/.env*"
      - "scripts/verify_env_no_secrets.py"
  push:
    branches:
      - main
    paths:
      - ".env*"
      - "**/.env*"
      - "scripts/verify_env_no_secrets.py"

jobs:
  env-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify env files do not contain concrete secrets
        run: python3 scripts/verify_env_no_secrets.py
