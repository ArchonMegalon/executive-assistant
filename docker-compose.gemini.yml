x-gemini-runtime: &gemini-runtime
  # Optional local override: mount the host's Gemini CLI + credentials into the EA runtime containers.
  # Usage:
  #   docker compose -f docker-compose.yml -f docker-compose.gemini.yml up -d --force-recreate ea-api ea-worker ea-scheduler
  user: "${EA_GEMINI_UID:-1000}:${EA_GEMINI_GID:-1000}"
  environment:
    - HOME=/home/ea
    # Use the host-installed Gemini CLI (Node script) via an explicit node invocation.
    - EA_GEMINI_VORTEX_COMMAND=node /usr/lib/node_modules/@google/gemini-cli/dist/index.js
  volumes:
    - /usr/bin/node:/usr/bin/node:ro
    - /usr/lib/node_modules:/usr/lib/node_modules:ro
    - ${HOME}/.gemini:/home/ea/.gemini:rw
    - /etc/passwd:/etc/passwd:ro
    - /etc/group:/etc/group:ro

services:
  ea-api:
    <<: *gemini-runtime

  ea-worker:
    <<: *gemini-runtime

  ea-scheduler:
    <<: *gemini-runtime
