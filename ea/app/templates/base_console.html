<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page_title }}</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --muted-panel: #f8fafc;
      --text: #111827;
      --muted: #667085;
      --line: #dbe2ea;
      --accent: #17324d;
      --accent-soft: #eaf0f6;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 236px 1fr;
      background: var(--bg);
      color: var(--text);
      font: 15px/1.5 ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Arial, sans-serif;
    }
    aside {
      background: var(--panel);
      border-right: 1px solid var(--line);
      padding: 22px 16px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 8px 18px;
      border-bottom: 1px solid var(--line);
      font-weight: 700;
      letter-spacing: -0.02em;
      text-decoration: none;
      color: inherit;
    }
    .mark {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      border: 1px solid var(--line);
      display: grid;
      place-items: center;
      font-size: 12px;
      color: var(--accent);
      background: #fff;
    }
    .workspace {
      padding: 14px 8px 6px;
      color: var(--muted);
      font-size: 13px;
    }
    .workspace strong {
      display: block;
      color: var(--text);
      font-size: 14px;
      margin-bottom: 4px;
    }
    .nav-group { margin-top: 14px; }
    .label {
      padding: 0 8px 8px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      font-weight: 700;
    }
    .nav-list {
      display: grid;
      gap: 4px;
    }
    .nav-list a {
      display: block;
      padding: 10px 12px;
      border-radius: 10px;
      color: var(--muted);
      font-weight: 600;
      text-decoration: none;
      border: 1px solid transparent;
    }
    .nav-list a:hover {
      background: #fbfcfd;
      border-color: var(--line);
      color: var(--text);
    }
    .nav-list a.active {
      background: var(--accent-soft);
      color: var(--accent);
      border: 1px solid #d7e3ef;
    }
    main { padding: 24px; }
    .page-title h1 {
      margin: 0 0 4px;
      font-size: 30px;
      letter-spacing: -0.03em;
    }
    .page-title p { margin: 0; color: var(--muted); }
    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .btn {
      min-height: 40px;
      padding: 0 14px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--panel);
      font-weight: 600;
      color: var(--text);
    }
    .btn.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .grid {
      display: grid;
      gap: 16px;
    }
    .stats {
      grid-template-columns: repeat(4, 1fr);
      margin-bottom: 18px;
    }
    .cards {
      grid-template-columns: repeat(3, 1fr);
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }
    .section-label, .eyebrow {
      margin-bottom: 10px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      font-weight: 700;
    }
    h2 {
      margin: 0 0 8px;
      font-size: 20px;
      letter-spacing: -0.02em;
    }
    .muted { color: var(--muted); }
    .stat-value, .stat strong {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.03em;
    }
    .stat { padding: 18px; }
    .card-list {
      display: grid;
      gap: 10px;
      margin: 14px 0 0;
      padding: 0;
      list-style: none;
    }
    .card-list li {
      padding-bottom: 10px;
      border-bottom: 1px solid #eef2f6;
      color: var(--muted);
    }
    .card-list li:last-child { border-bottom: 0; padding-bottom: 0; }
    .mini-note {
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--muted-panel);
      color: var(--muted);
      font-size: 14px;
      margin-top: 14px;
    }
    @media (max-width: 1100px) {
      body { grid-template-columns: 1fr; }
      aside { display: none; }
      .stats, .cards { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 760px) {
      main { padding: 16px; }
      .stats, .cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <aside>
    <a class="brand" href="/app/today"><div class="mark">EA</div><div>Executive Assistant</div></a>
    <div class="workspace"><strong>{{ workspace_label }}</strong>{{ access_email or principal_id }}</div>
    {% for group in nav_groups %}
    <div class="nav-group">
      <div class="label">{{ group.label }}</div>
      <div class="nav-list">
        {% for item in group["items"] %}
        <a href="{{ item.href }}" class="{% if current_nav == item.key %}active{% endif %}">{{ item.label }}</a>
        {% endfor %}
      </div>
    </div>
    {% endfor %}
  </aside>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
