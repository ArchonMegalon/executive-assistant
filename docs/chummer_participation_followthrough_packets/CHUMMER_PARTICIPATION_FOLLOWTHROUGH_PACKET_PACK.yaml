fail_closed_posture:
  missing_hub_reusable_account_proof: Refuse participation, entitlement, or reward followthrough when the Hub reusable-account receipt proof is missing or no longer proves the reward-journal and entitlement-journal rails.
  fleet_participation_blocked: Keep contribution and participation followthrough on hold when Fleet participation proof reports runtime blockers or unresolved design-canon drift.
  missing_channel_ref_projection: Hold channel followthrough when Hub or Fleet has not yet projected an explicit channel ref into the governed receipt window.
  missing_reward_publication_projection: Hold reward followthrough when Hub or Fleet has not yet projected an explicit reward-publication ref into the governed receipt window.
prohibited_behaviors:
  - Inventing account, sponsor-session, entitlement, channel, or reward state from local auth, browser cache, queue chatter, or worker context.
  - Treating registry-only desktop channel or reward refs as sufficient for this Hub/Fleet-only package.
  - Promoting a held packet to ready while Fleet participation proof remains blocked.
  - Copying task-local telemetry, helper output, or startup command receipts into followthrough evidence.
